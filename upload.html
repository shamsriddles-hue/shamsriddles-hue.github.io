<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Send to Deslo Centre</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 0;
    min-height: 100vh;
    background: linear-gradient(160deg, #1a1a1a 0%, #000000 100%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .header {
    text-align: center;
    margin: 20px 0 30px;
  }
  .lion {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,216,74,0.3), transparent 65%);
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 50px;
    border: 3px solid rgba(255,216,74,0.5);
    box-shadow: 0 0 20px rgba(255,216,74,0.4);
  }
  h1 {
    color: #ffd84a;
    font-size: 22px;
    letter-spacing: 3px;
    margin: 0 0 4px;
    font-weight: 800;
  }
  .subtitle {
    color: #888;
    font-size: 11px;
    letter-spacing: 2px;
  }
  .status {
    background: rgba(255,216,74,0.08);
    border: 1.5px solid rgba(255,216,74,0.4);
    border-radius: 12px;
    padding: 14px 20px;
    margin: 10px 0 25px;
    text-align: center;
    color: #ffd84a;
    font-size: 14px;
    font-weight: 700;
    width: 100%;
    max-width: 350px;
    min-height: 24px;
  }
  .status.connected { background: rgba(74,222,128,0.15); border-color: #4ade80; color: #4ade80; }
  .status.error { background: rgba(248,113,113,0.15); border-color: #f87171; color: #f87171; }
  .status.sending { background: rgba(96,165,250,0.15); border-color: #60a5fa; color: #60a5fa; }

  input[type="file"] { display: none; }
  .btn {
    background: linear-gradient(135deg, #ffd84a 0%, #ff8c00 100%);
    color: #000;
    padding: 22px 40px;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 2px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,140,0,0.4);
    transition: transform 0.15s;
    display: block;
    text-align: center;
    text-decoration: none;
    width: 100%;
    max-width: 350px;
    margin: 8px 0;
  }
  .btn:active { transform: scale(0.96); }
  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1.5px solid rgba(255,216,74,0.4);
    font-size: 16px;
    padding: 14px 24px;
  }

  .preview {
    margin-top: 20px;
    width: 100%;
    max-width: 350px;
  }
  .preview-card {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 10px;
    text-align: center;
    border: 1px solid rgba(255,216,74,0.3);
  }
  .preview-card img {
    max-width: 100%;
    max-height: 180px;
    border-radius: 8px;
    display: block;
    margin: 0 auto 8px;
  }
  .preview-card .lbl {
    font-size: 11px;
    color: #4ade80;
    font-weight: 700;
  }

  .footer {
    margin-top: auto;
    padding: 30px 0 10px;
    text-align: center;
    color: #555;
    font-size: 10px;
    letter-spacing: 1px;
  }
  .footer a { color: #ffd84a; text-decoration: none; }

  .conn-id {
    background: #000;
    color: #ffd84a;
    padding: 8px 14px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 12px;
    margin: 10px 0;
    word-break: break-all;
    border: 1px solid #333;
  }
</style>
</head>
<body>

<div class="header">
  <div class="lion">🦁</div>
  <h1>SEND TO DESLO</h1>
  <div class="subtitle">PHONE → SOFTWARE TRANSFER</div>
</div>

<div id="status" class="status">Connecting to PC...</div>

<input type="file" id="filepick" accept="image/*">
<label for="filepick" class="btn">📷 CHOOSE PHOTO</label>

<input type="file" id="filecamera" accept="image/*" capture="environment">
<label for="filecamera" class="btn btn-secondary">📸 TAKE PHOTO</label>

<div class="preview" id="preview"></div>

<div class="footer">
  Deslo Centre · Sale Paper Maker<br>
  © 2026 · Mr Shams
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
(function() {
  const params = new URLSearchParams(location.search);
  const pid = params.get('p') || params.get('id') || '';
  const statusEl = document.getElementById('status');
  const previewEl = document.getElementById('preview');
  let conn = null;
  let peer = null;

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }

  if (!pid) {
    setStatus('✗ No connection ID. Re-scan QR.', 'error');
    return;
  }

  try {
    peer = new Peer();
    peer.on('open', function(myId) {
      setStatus('Connecting to PC (' + pid.substr(0, 8) + '...)', '');
      conn = peer.connect(pid, { reliable: true });
      conn.on('open', function() {
        setStatus('✓ Connected — ready to send!', 'connected');
      });
      conn.on('close', function() {
        setStatus('Connection closed. Re-scan QR.', 'error');
      });
      conn.on('error', function(e) {
        setStatus('✗ Error: ' + (e.message || e), 'error');
      });
    });
    peer.on('error', function(e) {
      setStatus('✗ ' + (e.type || e.message || 'Connection failed'), 'error');
    });
  } catch(e) {
    setStatus('✗ ' + e.message, 'error');
  }

  function sendFile(file) {
    if (!conn || !conn.open) {
      setStatus('Not connected yet, please wait...', 'error');
      return;
    }
    setStatus('Reading photo...', 'sending');
    const reader = new FileReader();
    reader.onload = function() {
      setStatus('Sending photo...', 'sending');
      try {
        conn.send({ type: 'image', data: reader.result, name: file.name });
        // preview
        const card = document.createElement('div');
        card.className = 'preview-card';
        const img = document.createElement('img');
        img.src = reader.result;
        const lbl = document.createElement('div');
        lbl.className = 'lbl';
        lbl.textContent = '✓ Sent: ' + file.name;
        card.appendChild(img);
        card.appendChild(lbl);
        previewEl.insertBefore(card, previewEl.firstChild);
        setStatus('✓ Sent! Send more or close.', 'connected');
      } catch(e) {
        setStatus('✗ Send failed: ' + e.message, 'error');
      }
    };
    reader.onerror = function() {
      setStatus('✗ Could not read photo', 'error');
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('filepick').addEventListener('change', function(e) {
    if (e.target.files[0]) sendFile(e.target.files[0]);
    e.target.value = '';
  });
  document.getElementById('filecamera').addEventListener('change', function(e) {
    if (e.target.files[0]) sendFile(e.target.files[0]);
    e.target.value = '';
  });
})();
</script>

</body>
</html>
