<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Send to Deslo Centre</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 0;
    min-height: 100vh;
    background: linear-gradient(160deg, #1a1a1a 0%, #000000 100%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .header { text-align: center; margin: 20px 0 30px; }
  .lion {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,216,74,0.3), transparent 65%);
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 50px;
    border: 3px solid rgba(255,216,74,0.5);
    box-shadow: 0 0 20px rgba(255,216,74,0.4);
  }
  h1 { color: #ffd84a; font-size: 22px; letter-spacing: 3px; margin: 0 0 4px; font-weight: 800; }
  .subtitle { color: #888; font-size: 11px; letter-spacing: 2px; }
  .status {
    background: rgba(255,216,74,0.08);
    border: 1.5px solid rgba(255,216,74,0.4);
    border-radius: 12px;
    padding: 14px 20px;
    margin: 10px 0 25px;
    text-align: center;
    color: #ffd84a;
    font-size: 14px;
    font-weight: 700;
    width: 100%;
    max-width: 350px;
    min-height: 24px;
  }
  .status.connected { background: rgba(74,222,128,0.15); border-color: #4ade80; color: #4ade80; }
  .status.error { background: rgba(248,113,113,0.15); border-color: #f87171; color: #f87171; }
  .status.sending { background: rgba(96,165,250,0.15); border-color: #60a5fa; color: #60a5fa; }
  .status.warning { background: rgba(251,191,36,0.15); border-color: #fbbf24; color: #fbbf24; }
  input[type="file"] { display: none; }
  .btn {
    background: linear-gradient(135deg, #ffd84a 0%, #ff8c00 100%);
    color: #000; padding: 22px 40px; font-size: 20px; font-weight: 800;
    letter-spacing: 2px; border: none; border-radius: 16px;
    cursor: pointer; box-shadow: 0 6px 20px rgba(255,140,0,0.4);
    display: block; text-align: center; text-decoration: none;
    width: 100%; max-width: 350px; margin: 8px 0;
  }
  .btn:active { transform: scale(0.96); }
  .btn-secondary {
    background: rgba(255,255,255,0.08); color: #fff;
    border: 1.5px solid rgba(255,216,74,0.4); font-size: 16px; padding: 14px 24px;
  }
  .preview { margin-top: 20px; width: 100%; max-width: 350px; }
  .preview-card {
    background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 10px; margin-bottom: 10px; text-align: center;
    border: 1px solid rgba(255,216,74,0.3);
  }
  .preview-card img { max-width: 100%; max-height: 180px; border-radius: 8px; display: block; margin: 0 auto 8px; }
  .preview-card .lbl { font-size: 11px; color: #4ade80; font-weight: 700; }
  .retry-btn {
    margin-top: 8px; background: #c41e1e; color: #fff; border: none;
    padding: 10px 24px; border-radius: 8px; font-weight: 700;
    cursor: pointer; font-size: 13px; letter-spacing: 1px;
  }
  .footer {
    margin-top: auto; padding: 30px 0 10px; text-align: center;
    color: #555; font-size: 10px; letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="lion">🦁</div>
  <h1>SEND TO DESLO</h1>
  <div class="subtitle">PHONE → SOFTWARE TRANSFER</div>
</div>

<div id="status" class="status">Initializing...</div>

<input type="file" id="filepick" accept="image/*">
<label for="filepick" class="btn" id="pickBtn">📷 CHOOSE PHOTO</label>

<input type="file" id="filecamera" accept="image/*" capture="environment">
<label for="filecamera" class="btn btn-secondary" id="cameraBtn">📸 TAKE PHOTO</label>

<div id="retryWrap" style="display:none; text-align:center;">
  <button class="retry-btn" onclick="location.reload()">🔄 RETRY CONNECTION</button>
</div>

<div class="preview" id="preview"></div>

<div class="footer">Deslo Centre · Sale Paper Maker<br>© 2026 · Mr Shams</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var pid = params.get('p') || params.get('id') || '';
  var statusEl = document.getElementById('status');
  var previewEl = document.getElementById('preview');
  var retryWrap = document.getElementById('retryWrap');
  var conn = null, peer = null, connectTimer = null;
  var connectAttempts = 0, maxAttempts = 3;

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }
  function showRetry() { retryWrap.style.display = 'block'; }
  function hideRetry() { retryWrap.style.display = 'none'; }

  if (!pid) {
    setStatus('✗ No connection ID. Re-scan QR.', 'error');
    showRetry();
    return;
  }

  // Multi-STUN/TURN config — works through firewalls, mobile data, restricted networks
  var iceServers = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:stun3.l.google.com:19302' },
    { urls: 'stun:stun4.l.google.com:19302' },
    { urls: 'stun:global.stun.twilio.com:3478' },
    { urls: 'stun:openrelay.metered.ca:80' },
    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
  ];

  function attemptConnection() {
    connectAttempts++;
    setStatus('Connecting to PC... (try ' + connectAttempts + '/' + maxAttempts + ')', '');
    hideRetry();
    try {
      peer = new Peer({ config: { iceServers: iceServers }, debug: 0 });
      connectTimer = setTimeout(function() {
        if (!conn || !conn.open) {
          try { if (peer) peer.destroy(); } catch(e){}
          if (connectAttempts < maxAttempts) {
            setStatus('Retrying...', 'warning');
            setTimeout(attemptConnection, 1000);
          } else {
            setStatus('✗ Cannot reach PC. Check PC software is open.', 'error');
            showRetry();
          }
        }
      }, 15000);
      peer.on('open', function() {
        setStatus('Reaching PC...', '');
        conn = peer.connect(pid, { reliable: true, serialization: 'binary' });
        conn.on('open', function() {
          clearTimeout(connectTimer);
          setStatus('✓ Connected — ready to send photos!', 'connected');
          hideRetry();
        });
        conn.on('close', function() { setStatus('Disconnected. Tap retry.', 'warning'); showRetry(); });
        conn.on('error', function(e) {
          clearTimeout(connectTimer);
          setStatus('✗ Error: ' + (e.message || e.type || 'unknown'), 'error');
          showRetry();
        });
      });
      peer.on('error', function(e) {
        clearTimeout(connectTimer);
        var errType = e.type || '';
        if (errType === 'peer-unavailable') {
          setStatus('✗ PC offline. Refresh QR on PC.', 'error');
          showRetry();
        } else if (errType === 'network' || errType === 'disconnected' || errType === 'server-error') {
          if (connectAttempts < maxAttempts) {
            setStatus('Retrying network...', 'warning');
            try { if (peer) peer.destroy(); } catch(e){}
            setTimeout(attemptConnection, 1500);
          } else {
            setStatus('✗ Network blocked. Try WiFi.', 'error');
            showRetry();
          }
        } else {
          setStatus('✗ ' + (e.message || errType || 'failed'), 'error');
          showRetry();
        }
      });
    } catch(e) {
      setStatus('✗ Cannot start: ' + e.message, 'error');
      showRetry();
    }
  }

  attemptConnection();

  function sendFile(file) {
    if (!conn || !conn.open) {
      setStatus('Not connected yet, please wait...', 'warning');
      return;
    }
    setStatus('Reading photo...', 'sending');
    var reader = new FileReader();
    reader.onload = function() {
      setStatus('Sending photo...', 'sending');
      try {
        conn.send({ type: 'image', data: reader.result, name: file.name });
        var card = document.createElement('div');
        card.className = 'preview-card';
        var img = document.createElement('img');
        img.src = reader.result;
        var lbl = document.createElement('div');
        lbl.className = 'lbl';
        lbl.textContent = '✓ Sent: ' + file.name;
        card.appendChild(img);
        card.appendChild(lbl);
        previewEl.insertBefore(card, previewEl.firstChild);
        setStatus('✓ Sent! Send more or close.', 'connected');
      } catch(e) {
        setStatus('✗ Send failed: ' + e.message, 'error');
      }
    };
    reader.onerror = function() { setStatus('✗ Could not read photo', 'error'); };
    reader.readAsDataURL(file);
  }

  document.getElementById('filepick').addEventListener('change', function(e) {
    if (e.target.files[0]) sendFile(e.target.files[0]);
    e.target.value = '';
  });
  document.getElementById('filecamera').addEventListener('change', function(e) {
    if (e.target.files[0]) sendFile(e.target.files[0]);
    e.target.value = '';
  });
})();
</script>

</body>
</html>
